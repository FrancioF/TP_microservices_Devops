name: Deploy Microservices on Kubernetes with Helm

on:
  push:
    branches:
      - main

jobs:
  helm-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Setup Java
      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # 3. Build microservices
      - name: Build Microservices
        run: |
          for service in config-service discovery-service gateway-service catalogue-service commande-service paiement-service; do
            mvn -f $service/pom.xml clean package -DskipTests
          done

      # 4. Build Docker images
      - name: Build Docker Images
        run: |
          for service in config-service discovery-service gateway-service catalogue-service commande-service paiement-service; do
            docker build -t ${{ secrets.DOCKER_USERNAME }}/$service:latest ./$service
          done

      # 5. Login to Docker Hub
      - name: Docker Hub Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6. Push Docker images
      - name: Push Docker Images
        run: |
          for service in config-service discovery-service gateway-service catalogue-service commande-service paiement-service; do
            docker push ${{ secrets.DOCKER_USERNAME }}/$service:latest
          done

      # 7. Setup Kind (temporary Kubernetes cluster)
      - name: Setup Kind
        uses: engineerd/setup-kind@v0.5.0
        with:
          version: v0.20.0

      # 8. Load Docker images into Kind
      - name: Load images into Kind
        run: |
          for service in config-service discovery-service gateway-service catalogue-service commande-service paiement-service; do
            kind load docker-image ${{ secrets.DOCKER_USERNAME }}/$service:latest
          done

      # 9. Setup Helm
      - name: Setup Helm
        uses: azure/setup-helm@v3

      # 10. Deploy services with Helm
      - name: Deploy Services
        run: |
          for service in config-service discovery-service gateway-service catalogue-service commande-service paiement-service; do
            helm upgrade --install $service ./charts/$service
          done
name: Deploy Microservices

on:
  push:
    branches:
      - main

jobs:
  helm-deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build
        run: mvn clean package -DskipTests

      - name: Build Docker Images
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/config-service ./config-service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/discovery-service ./discovery-service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/gateway-service ./gateway-service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/catalogue-service ./catalogue-service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/commande-service ./commande-service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/paiement-service ./paiement-service

      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/config-service
          docker push ${{ secrets.DOCKER_USERNAME }}/discovery-service
          docker push ${{ secrets.DOCKER_USERNAME }}/gateway-service
          docker push ${{ secrets.DOCKER_USERNAME }}/catalogue-service
          docker push ${{ secrets.DOCKER_USERNAME }}/commande-service
          docker push ${{ secrets.DOCKER_USERNAME }}/paiement-service

      - name: Setup Helm
        uses: azure/setup-helm@v3

      - name: Deploy
        run: |
          helm upgrade --install config-service ./charts/config-service
          helm upgrade --install discovery-service ./charts/discovery-service
          helm upgrade --install gateway-service ./charts/gateway-service
          helm upgrade --install catalogue-service ./charts/catalogue-service
          helm upgrade --install commande-service ./charts/commande-service
          helm upgrade --install paiement-service ./charts/paiement-service
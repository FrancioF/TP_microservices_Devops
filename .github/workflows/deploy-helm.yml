name: Deploy Microservices on Kubernetes with Helm

on:
  push:
    branches:
      - main

jobs:
  helm-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Setup Java
      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # 3. Build microservices (FIXED)
      - name: Build Microservices
        run: |
          for service in config-service discovery-service gateway-service catalogue-service commande-service paiement-service; do
            mvn -f $service/pom.xml clean package -DskipTests
          done

      # 4. Build Docker images
      - name: Build Docker Images
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/config-service:latest ./config-service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/discovery-service:latest ./discovery-service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/gateway-service:latest ./gateway-service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/catalogue-service:latest ./catalogue-service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/commande-service:latest ./commande-service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/paiement-service:latest ./paiement-service

      # 5. Login to Docker Hub
      - name: Docker Hub Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6. Push Docker images
      - name: Push Docker Images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/config-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/discovery-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/gateway-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/catalogue-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/commande-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/paiement-service:latest

      # 7. Setup Helm
      - name: Setup Helm
        uses: azure/setup-helm@v3

      # 8. Deploy with Helm
      - name: Deploy Services
        run: |
          helm upgrade --install config-service ./charts/config-service
          helm upgrade --install discovery-service ./charts/discovery-service
          helm upgrade --install gateway-service ./charts/gateway-service
          helm upgrade --install catalogue-service ./charts/catalogue-service
          helm upgrade --install commande-service ./charts/commande-service
          helm upgrade --install paiement-service ./charts/paiement-service